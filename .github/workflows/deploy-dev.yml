name: Deploy DEV to Umbrel via Cloudflare

on:
  push:
    branches:
      - dev # 👈 1. Déclenchement uniquement sur la branche dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☁️ Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: 🚀 Deploy files via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          CF_DOMAIN: ${{ secrets.CF_SSH_DOMAIN }}
          DEST_DIR: "/home/umbrel/umbrel/home/PLT-DEV/" # 👈 2. Le nouveau dossier sur ton serveur
        run: |
          # 1. Setup SSH Key safely
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # 2. Configure SSH to use Cloudflare Tunnel as a proxy
          cat <<EOF >> ~/.ssh/config
          Host $CF_DOMAIN
            User $SERVER_USER
            IdentityFile ~/.ssh/id_ed25519
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking accept-new
          EOF

          # 3. Sync the files to your Umbrel (en excluant bien node_modules !)
          # 👈 3. Synchronisation vers le DEST_DIR
          rsync -avz --delete --exclude='.git/' --exclude='node_modules/' ./ $CF_DOMAIN:$DEST_DIR
          
          # 4. Optional: Restart PM2
          # ssh $CF_DOMAIN "pm2 restart app-dev" # Tu pourras cibler spécifiquement l'app Dev ici