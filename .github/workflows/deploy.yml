name: Deploy PROD to Umbrel via Cloudflare

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☁️ Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: 🚀 Deploy files via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          CF_DOMAIN: ${{ secrets.CF_SSH_DOMAIN }}
          DEST_DIR: "/home/umbrel/umbrel/home/PLT/" 
        run: |
          # 1. Setup SSH Key safely
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # 2. Configure SSH to use Cloudflare Tunnel as a proxy (SANS tokens)
          cat <<EOF >> ~/.ssh/config
          Host $CF_DOMAIN
            User $SERVER_USER
            IdentityFile ~/.ssh/id_ed25519
            ProxyCommand cloudflared access tcp --hostname %h
            StrictHostKeyChecking accept-new
          EOF

          # 3. Sync the files to your Umbrel
          rsync -avz --delete --exclude='.git/' ./ $CF_DOMAIN:$DEST_DIR
          
          # 4. Optional: Restart PM2 so changes take effect
          ssh $CF_DOMAIN "pm2 restart all"